# =============================================================================
# PostgreSQL 17 — Core Wallet (20 TPS scope, 4 vCPU / 16 GB)
# Tuned per wallet_HLD_20tps.md §11.1
#
# Notes for local dev:
#   - synchronous_commit + fsync stay ON. NEVER turn off for financial data.
#   - For laptop dev where durability isn't critical, you may set
#       synchronous_commit = off
#     but that's a dev-only deviation.
# =============================================================================

# ─── Connection ──────────────────────────────────────────────────────────────
listen_addresses = '*'
port = 5432
max_connections = 100              # PgBouncer multiplexes; 100 is plenty

# ─── Memory ──────────────────────────────────────────────────────────────────
shared_buffers = 4GB                    # 25% of 16GB
effective_cache_size = 12GB             # 75% — planner hint
work_mem = 16MB                          # per-sort/hash op
maintenance_work_mem = 512MB             # VACUUM, CREATE INDEX
wal_buffers = 64MB
huge_pages = try                         # use HugePages if OS allows

# ─── Write-Ahead Log & durability — DO NOT WEAKEN FOR FINANCIAL DATA ────────
wal_level = logical                      # required for Debezium / future CDC + DR replica
synchronous_commit = on                  # commit acks only after WAL fsync
fsync = on
full_page_writes = on
wal_compression = lz4                    # PG14+ compresses WAL pages
max_wal_senders = 5                      # WAL streaming + Debezium slots
max_replication_slots = 5
wal_keep_size = 1GB                      # keep enough WAL for slow replicas
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
max_wal_size = 4GB
min_wal_size = 1GB

# ─── Autovacuum — aggressive for the hot UPDATE table WLT_ACCT ──────────────
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 10s
autovacuum_vacuum_scale_factor = 0.05
autovacuum_vacuum_insert_scale_factor = 0.05
autovacuum_vacuum_cost_limit = 1500
autovacuum_vacuum_cost_delay = 2ms

# ─── Query planner ──────────────────────────────────────────────────────────
random_page_cost = 1.1                   # SSD
effective_io_concurrency = 200
default_statistics_target = 100

# ─── Timeouts (HLD §9 layered timeouts) ─────────────────────────────────────
statement_timeout = 2500ms               # outer ring
lock_timeout = 1500ms                    # inner ring
idle_in_transaction_session_timeout = 30s
deadlock_timeout = 1s

# ─── Parallel query (helpful for ad-hoc analytics, off the hot path) ────────
max_worker_processes = 8
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2

# ─── Logging — stderr only (docker captures, no file rotation needed in dev) ─
# For prod: enable logging_collector + log_directory mounted to a volume.
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 500ms       # log slow queries
log_checkpoints = on
log_connections = off                    # noisy with PgBouncer pool churn
log_disconnections = off
log_lock_waits = on
log_temp_files = 10MB
log_autovacuum_min_duration = 1000ms
log_line_prefix = '%m [%p] %q%u@%d/%a '
log_timezone = 'Asia/Ho_Chi_Minh'

# ─── Statistics ─────────────────────────────────────────────────────────────
track_activities = on
track_counts = on
track_io_timing = on
track_functions = pl
track_wal_io_timing = on
# Note: stats_temp_directory removed in PG 15 — stats now live in shared memory.

# ─── Locale / TZ ────────────────────────────────────────────────────────────
timezone = 'Asia/Ho_Chi_Minh'
datestyle = 'iso, mdy'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'

# ─── Extensions allowlist ───────────────────────────────────────────────────
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all
pg_stat_statements.track_utility = off

# ─── Security ───────────────────────────────────────────────────────────────
password_encryption = scram-sha-256
ssl = off                                # enable in prod with certs mounted; off for local dev
