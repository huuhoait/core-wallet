# Production config overrides
apiVersion: v1
kind: ConfigMap
metadata:
  name: wallet-service-config
  namespace: wallet
data:
  APP_ENV: "production"
  GIN_MODE: "release"
  HTTP_ADDR: ":8080"
  DB_LOCK_TIMEOUT: "1500ms"
  DB_STATEMENT_TIMEOUT: "2500ms"
  HTTP_REQUEST_TIMEOUT: "10s"
  HTTP_READ_TIMEOUT: "15s"
  HTTP_WRITE_TIMEOUT: "15s"
  HTTP_IDLE_TIMEOUT: "60s"
  HTTP_SHUTDOWN_TIMEOUT: "15s"
  DB_MAX_CONNS: "50"
  DB_MIN_CONNS: "10"
  DB_MAX_CONN_LIFETIME: "30m"
  DB_MAX_CONN_IDLE: "5m"
  DB_TX_MAX_RETRIES: "3"
  OTEL_ENABLED: "true"
  OTEL_SERVICE_NAME: "wallet-service"
  OTEL_EXPORTER_OTLP_INSECURE: "true"
  # EOD enabled on ONE pod only (see eod-deployment.yaml if separate)
  EOD_ENABLED: "true"
  EOD_RUN_AT: "00:30:00"
  EOD_GL_CUTOFF: "18:00:00"
  EOD_TIMEZONE: "Asia/Ho_Chi_Minh"
  EOD_RUN_TIMEOUT: "30m"
