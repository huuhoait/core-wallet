# On-premise resource sizing (bare-metal nodes, usually more generous)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-service
  namespace: wallet
spec:
  template:
    spec:
      containers:
        - name: wallet-service
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
        - name: pgbouncer
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      # On-prem: prefer nodes with SSD and labeled for wallet workload
      nodeSelector:
        workload/wallet: "true"
      tolerations:
        - key: "workload/wallet"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
