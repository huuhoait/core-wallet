apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wallet

resources:
  - ../../base
  - postgres-statefulset.yaml

# On-premise specific patches
patches:
  # Use nginx ingress (on-prem standard)
  - target:
      kind: Ingress
      name: wallet-service
    patch: |
      - op: replace
        path: /spec/ingressClassName
        value: nginx
      - op: replace
        path: /spec/tls/0/hosts/0
        value: wallet-api.internal.local
      - op: replace
        path: /spec/rules/0/host
        value: wallet-api.internal.local
      - op: replace
        path: /spec/tls/0/secretName
        value: wallet-tls-onprem

  # Point PgBouncer to in-cluster PostgreSQL
  - target:
      kind: Deployment
      name: wallet-service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/1/env/0/value
        value: postgres-primary.wallet.svc.cluster.local

  # On-prem uses local storage class
  - target:
      kind: NetworkPolicy
      name: wallet-service-ingress
    patch: |
      - op: replace
        path: /spec/egress/0/to/0/ipBlock/cidr
        value: 10.0.0.0/8

patchesStrategicMerge:
  - resources-patch.yaml
  - hpa-patch.yaml

images:
  - name: ghcr.io/OWNER/core-wallet/wallet-service
    newName: registry.internal.local/core-wallet/wallet-service
    newTag: latest
