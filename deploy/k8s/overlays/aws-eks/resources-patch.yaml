# AWS EKS production resource sizing
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-service
  namespace: wallet
spec:
  template:
    spec:
      containers:
        - name: wallet-service
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
        - name: pgbouncer
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
