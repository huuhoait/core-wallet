apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-service
  namespace: wallet
  labels:
    app.kubernetes.io/name: wallet-service
    app.kubernetes.io/part-of: core-wallet
    app.kubernetes.io/component: api
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wallet-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wallet-service
        app.kubernetes.io/part-of: core-wallet
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: wallet-service
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534

      # wallet-service waits for pgbouncer to be ready
      initContainers: []

      containers:
        # ── wallet-service (main) ──
        - name: wallet-service
          image: ghcr.io/OWNER/core-wallet/wallet-service:latest  # patched by kustomize
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: wallet-service-config
          env:
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: wallet-db-credentials
                  key: DB_DSN
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: wallet-otel
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 2
            failureThreshold: 15
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]  # drain ALB connections

        # ── PgBouncer sidecar ──
        - name: pgbouncer
          image: edoburu/pgbouncer:1.22.1-p0
          imagePullPolicy: IfNotPresent
          ports:
            - name: pgbouncer
              containerPort: 6432
              protocol: TCP
          env:
            - name: DB_HOST
              value: "pg-primary"  # patched per overlay
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "wallet"
            - name: DB_USER
              value: "wallet_app"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wallet-db-credentials
                  key: DB_DSN  # extract password in entrypoint or use userlist
            - name: POOL_MODE
              value: "transaction"
            - name: DEFAULT_POOL_SIZE
              value: "16"
            - name: MAX_CLIENT_CONN
              value: "200"
            - name: RESERVE_POOL_SIZE
              value: "5"
            - name: SERVER_IDLE_TIMEOUT
              value: "600"
            - name: MAX_PREPARED_STATEMENTS
              value: "200"
            - name: AUTH_TYPE
              value: "scram-sha-256"
            - name: IGNORE_STARTUP_PARAMETERS
              value: "extra_float_digits,application_name,search_path"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 5
            periodSeconds: 10

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: wallet-service
