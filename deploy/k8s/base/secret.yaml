# =============================================================================
# Secrets — placeholder. In production use:
#   - AWS: ExternalSecrets Operator + Secrets Manager
#   - On-premise: HashiCorp Vault + vault-secrets-operator
#   - Or: sealed-secrets (Bitnami)
#
# NEVER commit real values. This file shows the structure only.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: wallet-db-credentials
  namespace: wallet
  labels:
    app.kubernetes.io/name: wallet-service
    app.kubernetes.io/part-of: core-wallet
type: Opaque
stringData:
  # Primary connection (via PgBouncer sidecar)
  DB_DSN: "postgres://wallet_app:CHANGE_ME@localhost:6432/wallet?sslmode=disable"
  # Read replica (optional — lag-tolerant reads)
  # DB_READ_DSN: "postgres://wallet_app:CHANGE_ME@pg-read:6432/wallet?sslmode=disable"
  # PII pool (optional — wallet_pii_ro role for unmasked client reads)
  # DB_PII_DSN: "postgres://wallet_pii_ro:CHANGE_ME@localhost:6432/wallet?sslmode=disable"
  # EOD direct connection (bypasses PgBouncer, wallet_eod role)
  # EOD_DSN: "postgres://wallet_eod:CHANGE_ME@pg-primary:5432/wallet?sslmode=require"
  # PgBouncer userlist
  PGBOUNCER_USERLIST: |
    "wallet_app" "SCRAM-SHA-256$4096:salt$stored_key:server_key"
    "wallet_pii_ro" "SCRAM-SHA-256$4096:salt$stored_key:server_key"
---
apiVersion: v1
kind: Secret
metadata:
  name: wallet-otel
  namespace: wallet
  labels:
    app.kubernetes.io/part-of: core-wallet
type: Opaque
stringData:
  OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector.observability.svc.cluster.local:4317"
