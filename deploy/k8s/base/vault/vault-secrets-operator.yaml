# =============================================================================
# Vault Secrets Operator (VSO) — syncs Vault secrets → K8s Secrets
# Install via: helm install vault-secrets-operator hashicorp/vault-secrets-operator -n vault
#
# These CRDs configure the operator to pull wallet DB credentials from Vault
# and sync them as Kubernetes Secrets in the wallet namespace.
# =============================================================================

# VaultConnection — tells VSO where Vault lives
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: vault-connection
  namespace: wallet
spec:
  address: http://vault.vault.svc.cluster.local:8200
  skipTLSVerify: false
---
# VaultAuth — authenticate to Vault via Kubernetes auth method
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: wallet-auth
  namespace: wallet
spec:
  vaultConnectionRef: vault-connection
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: wallet-service
    serviceAccount: wallet-service
---
# VaultStaticSecret — sync DB credentials (wallet_app)
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: wallet-db-credentials
  namespace: wallet
spec:
  type: kv-v2
  mount: secret
  path: core-wallet/db/wallet-app
  destination:
    name: wallet-db-credentials
    create: true
    overwrite: true
    labels:
      app.kubernetes.io/part-of: core-wallet
  refreshAfter: 1h
  vaultAuthRef: wallet-auth
---
# VaultStaticSecret — sync DB credentials (wallet_pii_ro)
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: wallet-pii-credentials
  namespace: wallet
spec:
  type: kv-v2
  mount: secret
  path: core-wallet/db/wallet-pii-ro
  destination:
    name: wallet-pii-credentials
    create: true
    overwrite: true
  refreshAfter: 1h
  vaultAuthRef: wallet-auth
---
# VaultStaticSecret — sync DB credentials (wallet_eod)
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: wallet-eod-credentials
  namespace: wallet
spec:
  type: kv-v2
  mount: secret
  path: core-wallet/db/wallet-eod
  destination:
    name: wallet-eod-credentials
    create: true
    overwrite: true
  refreshAfter: 1h
  vaultAuthRef: wallet-auth
---
# VaultStaticSecret — OTel config (endpoint, optional auth tokens)
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: wallet-otel
  namespace: wallet
spec:
  type: kv-v2
  mount: secret
  path: core-wallet/otel
  destination:
    name: wallet-otel
    create: true
    overwrite: true
  refreshAfter: 24h
  vaultAuthRef: wallet-auth
