# Network policies — restrict traffic to least-privilege
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wallet-service-ingress
  namespace: wallet
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: wallet-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from ingress controller (nginx/ALB) only
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 8080
          protocol: TCP
  egress:
    # Allow to PostgreSQL (primary + replica)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0  # patched per overlay to restrict to DB CIDR
      ports:
        - port: 5432
          protocol: TCP
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow OTel collector
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - port: 4317
          protocol: TCP
