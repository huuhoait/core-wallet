# =============================================================================
# pg_hba.conf — Host-Based Authentication
# Order matters: first matching rule wins.
# Reload after change: docker compose kill -s HUP postgres
# =============================================================================

# Type   Database  User              Address           Method

# ─── Local socket (docker-entrypoint init scripts) ──────────────────────────
local    all       postgres                            trust
local    all       all                                 scram-sha-256

# ─── Superuser: full access from any host (dev convenience) ─────────────────
# Prod: restrict to bastion IP or remove and use ssh tunnel.
host     all       postgres          0.0.0.0/0         scram-sha-256
host     all       postgres          ::/0              scram-sha-256

# ─── App roles: only the wallet database, from any host ─────────────────────
host     wallet    wallet_app        0.0.0.0/0         scram-sha-256
host     wallet    wallet_pii_ro     0.0.0.0/0         scram-sha-256
host     wallet    wallet_admin      0.0.0.0/0         scram-sha-256
host     wallet    wallet_app        ::/0              scram-sha-256
host     wallet    wallet_pii_ro     ::/0              scram-sha-256
host     wallet    wallet_admin      ::/0              scram-sha-256

# ─── Replication (sync standby + DR replica) ────────────────────────────────
host     replication  postgres       172.16.0.0/12     scram-sha-256
host     replication  postgres       0.0.0.0/0         scram-sha-256
