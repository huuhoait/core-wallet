; =============================================================================
; PgBouncer — transaction-mode pooler for Core Wallet
; PgBouncer parses everything after `=` as the value, so inline `;` comments
; on value lines BREAK parsing. Always put comments on their own lines.
; =============================================================================

[databases]
; Upstream wallet DB
wallet = host=postgres port=5432 dbname=wallet auth_user=postgres

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432

; ── Authentication ──────────────────────────────────────────────────────────
; Dev: trust on PgBouncer side, real SCRAM-SHA-256 on PostgreSQL side.
; Prod: switch to auth_type=scram-sha-256 + auth_query against a SECURITY
; DEFINER function in PG, so no plaintext passwords in userlist.txt.
auth_type = trust
auth_file = /etc/pgbouncer/userlist.txt
auth_user = postgres

; ── Pool mode (MUST be transaction for Core Wallet, see HLD §11.2) ─────────
pool_mode = transaction

; ── Pool sizing (20 TPS dev — tune up for prod) ────────────────────────────
max_client_conn = 500
default_pool_size = 32
reserve_pool_size = 16
reserve_pool_timeout = 5
min_pool_size = 16

; ── Server timeouts ─────────────────────────────────────────────────────────
server_idle_timeout = 600
server_lifetime = 3600
server_connect_timeout = 15
server_login_retry = 15

; ── Client timeouts — 0 means disabled, let PG enforce ─────────────────────
client_idle_timeout = 0
client_login_timeout = 60
query_timeout = 0
query_wait_timeout = 120
idle_transaction_timeout = 0

; ── Prepared statements (PgBouncer 1.21+ in transaction mode) ──────────────
max_prepared_statements = 200

; ── Startup parameter passthrough ──────────────────────────────────────────
ignore_startup_parameters = extra_float_digits,application_name,search_path,IntervalStyle

; ── Admin ──────────────────────────────────────────────────────────────────
admin_users = postgres
stats_users = postgres,wallet_app

; ── Logging — quiet for steady state, verbose on error ─────────────────────
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
log_stats = 1
stats_period = 60
verbose = 0

; ── Connection limits ──────────────────────────────────────────────────────
max_db_connections = 100
max_user_connections = 100

; ── TCP keepalive ──────────────────────────────────────────────────────────
tcp_keepalive = 1
tcp_keepidle = 60
tcp_keepintvl = 30

; ── Hardening ──────────────────────────────────────────────────────────────
unix_socket_dir =
disable_pqexec = 0
