# =============================================================================
# Core Wallet — YugabyteDB 2-NODE cluster PoC (project core-wallet-yb2).
#
# 2 yugabyted nodes (node2 --join node1). With 2 nodes the universe runs RF=1
# (Raft needs an odd count for quorum — RF=3 needs ≥3 nodes), so data is SHARDED
# across the 2 nodes but NOT replicated. A posting touching tablets on both nodes
# is still a cross-node distributed transaction. Lighter than the 3-node setup
# (no replication consensus + more RAM/node) — better fit for a single 7.7 GB box.
# wallet-service-yb connects to yb-node1:5433 (coordinates the distributed txn).
#
#   docker compose -f docker-compose.yb2.yml up -d yb-node1          # bootstrap
#   docker compose -f docker-compose.yb2.yml up -d yb-node2          # join
#   # init: create db + roles + schema.yb.sql + partitions + seed + pii_dek
#   docker compose -f docker-compose.yb2.yml up -d wallet-service-yb # :8029
#
# Nuke:  docker compose -f docker-compose.yb2.yml down -v
# =============================================================================

name: core-wallet-yb2

x-ybnode: &ybnode
  image: yugabytedb/yugabyte:latest
  restart: unless-stopped
  deploy:
    resources:
      limits:
        cpus: "4"
        memory: 4096M
      reservations:
        cpus: "2"
        memory: 2G
  networks:
    - yb2-net

services:
  yb-node1:
    <<: *ybnode
    container_name: wallet-yb-node1
    hostname: yb-node1
    command:
      - "bin/yugabyted"
      - "start"
      - "--background=false"
      - "--advertise_address=yb-node1"
      - "--tserver_flags=ysql_sequence_cache_minval=1000"
    ports:
      - "${YB2_YSQL_PORT:-5433}:5433"     # YSQL on node1 (PG wire)
      - "${YB2_UI_PORT:-15433}:15433"     # yugabyted UI
      - "${YB2_MASTER_UI_PORT:-7001}:7000"
    volumes:
      - yb2_node1:/root/var
    networks:
      yb2-net:
        aliases:
          - yb-cluster
    healthcheck:
      test: ["CMD-SHELL", "bin/ysqlsh -h yb-node1 -U yugabyte -d yugabyte -c 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 60s

  yb-node2:
    <<: *ybnode
    container_name: wallet-yb-node2
    hostname: yb-node2
    depends_on:
      yb-node1:
        condition: service_started
    command:
      - "bin/yugabyted"
      - "start"
      - "--background=false"
      - "--advertise_address=yb-node2"
      - "--join=yb-node1"
      - "--tserver_flags=ysql_sequence_cache_minval=1000"
    volumes:
      - yb2_node2:/root/var
    networks:
      yb2-net:
        aliases:
          - yb-cluster
    healthcheck:
      test: ["CMD-SHELL", "bin/ysqlsh -h yb-node2 -U yugabyte -d yugabyte -c 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 60s

  wallet-service-yb:
    build:
      context: ./services
      dockerfile: wallet-service/Dockerfile
      args:
        VERSION: ${WALLET_SERVICE_VERSION:-dev}
    image: core-wallet/wallet-service:dev
    container_name: wallet-service-yb2
    restart: unless-stopped
    depends_on:
      yb-node1:
        condition: service_healthy
      yb-node2:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-dev}
      GIN_MODE: ${GIN_MODE:-release}
      HTTP_ADDR: ":8080"
      DB_DSN: postgres://wallet_app:${WALLET_APP_PASSWORD:-wallet_app_dev}@yb-cluster:5433/wallet?sslmode=disable
      DB_PII_DSN: postgres://wallet_pii_ro:${WALLET_PII_RO_PASSWORD:-wallet_pii_dev}@yb-cluster:5433/wallet?sslmode=disable
      DB_LOCK_TIMEOUT: ${DB_LOCK_TIMEOUT:-1500ms}
      DB_STATEMENT_TIMEOUT: ${DB_STATEMENT_TIMEOUT:-2500ms}
      HTTP_REQUEST_TIMEOUT: ${HTTP_REQUEST_TIMEOUT:-10s}
      DB_MAX_CONNS: ${DB_MAX_CONNS:-50}
      DB_MIN_CONNS: ${DB_MIN_CONNS:-5}
      OTEL_ENABLED: "false"
    ports:
      - "${WALLET_SERVICE_YB_PORT:-8029}:8080"
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - yb2-net

volumes:
  yb2_node1:
    name: wallet_yb2_node1
  yb2_node2:
    name: wallet_yb2_node2

networks:
  yb2-net:
    name: core-wallet-yb2-net
    driver: bridge
