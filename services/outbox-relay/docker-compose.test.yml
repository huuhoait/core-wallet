version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: outbox-test-postgres
    environment:
      POSTGRES_DB: wallet
      POSTGRES_USER: wallet_app
      POSTGRES_PASSWORD: wallet_password
    ports:
      - "5432:5432"
    volumes:
      - ./db/test-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/test-data.sql:/docker-entrypoint-initdb.d/02-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet_app -d wallet"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Kafka Cluster
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: outbox-test-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: outbox-test-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Kafka UI (optional, for debugging)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: outbox-test-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  # Outbox Relay Service
  outbox-relay:
    build: .
    container_name: outbox-test-relay
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: wallet_app
      DB_PASSWORD: wallet_password
      DB_NAME: wallet
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_PREFIX: wallet
      POLL_INTERVAL: 1s
      BATCH_SIZE: 10
      MAX_RETRIES: 3
      RETRY_DELAY: 5s
      WORKER_COUNT: 2
      METRICS_PORT: 9090
      LOG_LEVEL: debug
    ports:
      - "9090:9090"
    restart: unless-stopped

  # Test Consumer (to verify events)
  test-consumer:
    image: confluentinc/cp-kafka:7.5.0
    container_name: outbox-test-consumer
    depends_on:
      - kafka
    command: >
      sh -c "
        sleep 10 &&
        kafka-console-consumer --bootstrap-server kafka:9092 --topic wallet.transactions.posted --from-beginning --max-messages 10
      "