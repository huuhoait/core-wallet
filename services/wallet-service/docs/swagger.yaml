basePath: /
consumes:
- application/json
definitions:
  dto.AccountOpenResponse:
    properties:
      acct_no:
        type: string
      acct_status:
        type: string
      acct_type:
        type: string
      ccy:
        type: string
      client_no:
        type: string
    type: object
  dto.AccountResponse:
    properties:
      acct_no:
        type: string
      acct_open_date:
        type: string
      acct_role:
        type: string
      acct_status:
        type: string
      acct_type:
        type: string
      actual_bal:
        type: string
      available_bal:
        description: calc_bal = actual - restrained
        type: string
      ccy:
        type: string
      client_no:
        type: string
      cr_blocked:
        type: string
      group_id:
        type: string
      last_tran_date:
        type: string
      prev_day_bal:
        type: string
      restrained_amt:
        type: string
      restraint_present:
        type: string
      shard_index:
        type: integer
      version:
        type: integer
    type: object
  dto.AccountStatusResponse:
    properties:
      acct_no:
        type: string
      acct_status:
        type: string
      version:
        type: integer
    type: object
  dto.AckRequest:
    properties:
      treasury_batch_id:
        maxLength: 64
        minLength: 4
        type: string
    required:
    - treasury_batch_id
    type: object
  dto.ActivateHotWalletRequest:
    properties:
      shard_count:
        enum:
        - 4
        - 8
        - 16
        type: integer
    type: object
  dto.ActivateHotWalletResponse:
    properties:
      group_id:
        type: string
      settlement_acct_no:
        type: string
      shard_acct_nos:
        items:
          type: string
        type: array
      shard_count:
        type: integer
    type: object
  dto.AddRestraintRequest:
    properties:
      acct_no:
        type: string
      end_date:
        type: string
      narrative:
        maxLength: 500
        type: string
      pledged_amt:
        type: string
      reference_doc:
        maxLength: 500
        type: string
      restraint_purpose:
        type: string
      restraint_type:
        type: string
      start_date:
        type: string
    required:
    - acct_no
    - restraint_purpose
    - restraint_type
    type: object
  dto.BalanceBatchItem:
    properties:
      acct_no:
        type: string
      actual_bal:
        type: string
      available_bal:
        type: string
      ccy:
        type: string
      error:
        type: string
      restrained_amt:
        type: string
    type: object
  dto.BalanceBatchRequest:
    properties:
      acct_nos:
        items:
          type: string
        maxItems: 100
        minItems: 1
        type: array
    required:
    - acct_nos
    type: object
  dto.BalanceBatchResponse:
    properties:
      as_of:
        type: string
      items:
        items:
          $ref: '#/definitions/dto.BalanceBatchItem'
        type: array
    type: object
  dto.BalanceOpsResponse:
    properties:
      acct_no:
        type: string
      acct_status:
        type: string
      active_restraints:
        items:
          type: object
        type: array
      actual_bal:
        type: string
      as_of:
        type: string
      available_bal:
        type: string
      calc_bal:
        type: string
      ccy:
        type: string
      client_no:
        type: string
      cr_blocked:
        type: string
      last_tran_date:
        type: string
      ledger_bal:
        type: string
      previous_day_bal:
        type: string
      restrained_amt:
        type: string
      restraint_present:
        type: string
      version:
        type: integer
    type: object
  dto.BalanceResponse:
    properties:
      acct_no:
        type: string
      acct_status:
        type: string
      actual_bal:
        type: string
      as_of:
        type: string
      available_bal:
        type: string
      ccy:
        type: string
      last_tran_date:
        type: string
      masked:
        type: boolean
      message:
        type: string
      restrained_amt:
        type: string
    type: object
  dto.BankLinkResponse:
    properties:
      client_no:
        type: string
      is_default:
        type: boolean
      link_id:
        type: integer
      status:
        type: string
      timestamp:
        type: string
    type: object
  dto.ClientFullResponse:
    properties:
      acct_exec:
        type: string
      birth_date:
        type: string
      client_grp:
        type: string
      client_name:
        type: string
      client_no:
        type: string
      client_type:
        type: string
      country_citizen:
        type: string
      country_loc:
        type: string
      created_at:
        type: string
      given_name:
        type: string
      global_id:
        type: string
      global_id_type:
        type: string
      kyc_status:
        type: string
      kyc_tier:
        type: string
      marital_status:
        type: string
      registered_date:
        type: string
      resident_status:
        type: string
      risk_level:
        type: string
      sex:
        type: string
      status:
        type: string
      surname:
        type: string
      updated_at:
        type: string
      verified_at:
        type: string
    type: object
  dto.ClientListResponse:
    properties:
      count:
        type: integer
      items:
        items:
          $ref: '#/definitions/dto.ClientProfileResponse'
        type: array
      next_cursor:
        description: pass as ?after= for the next page
        type: string
      page_size:
        type: integer
    type: object
  dto.ClientProfileResponse:
    properties:
      acct_exec:
        type: string
      birth_date:
        type: string
      client_grp:
        type: string
      client_name_masked:
        type: string
      client_no:
        type: string
      client_type:
        type: string
      country_citizen:
        type: string
      country_loc:
        type: string
      global_id_masked:
        type: string
      global_id_type:
        type: string
      kyc_status:
        type: string
      kyc_tier:
        type: string
      phone_masked:
        type: string
      resident_status:
        type: string
      risk_level:
        type: string
      sex:
        type: string
      status:
        type: string
      verified_at:
        type: string
    type: object
  dto.ClientResponse:
    properties:
      client_no:
        type: string
      status:
        type: string
      timestamp:
        type: string
    type: object
  dto.CompletedRequest:
    properties:
      napas_ref:
        maxLength: 64
        minLength: 4
        type: string
    required:
    - napas_ref
    type: object
  dto.CreateClientRequest:
    properties:
      birth_date:
        type: string
      client_name:
        maxLength: 200
        type: string
      client_type:
        type: string
      country_citizen:
        maxLength: 8
        type: string
      country_loc:
        maxLength: 8
        type: string
      given_name:
        maxLength: 80
        type: string
      global_id:
        maxLength: 64
        type: string
      global_id_type:
        maxLength: 12
        type: string
      sex:
        enum:
        - M
        - F
        - O
        type: string
      surname:
        maxLength: 80
        type: string
    required:
    - client_name
    - client_type
    type: object
  dto.FeeChargeRequest:
    properties:
      acct_no:
        type: string
      amount:
        type: string
      fee_code:
        maxLength: 16
        minLength: 2
        type: string
      metadata:
        additionalProperties: {}
        type: object
      narrative:
        maxLength: 250
        type: string
      reference:
        maxLength: 64
        minLength: 8
        type: string
    required:
    - acct_no
    - amount
    - reference
    type: object
  dto.FeeChargeResponse:
    properties:
      event_uuid:
        type: string
      fee_gross:
        type: string
      new_balance:
        type: string
      status:
        type: string
      tran_internal_key:
        type: integer
      vat_amount:
        type: string
    type: object
  dto.FeeChargeReversalRequest:
    properties:
      initiator:
        enum:
        - OPS_MANUAL
        - FRAUD
        - DISPUTE
        - SYSTEM
        type: string
      reason:
        maxLength: 500
        minLength: 3
        type: string
      reference:
        maxLength: 64
        minLength: 8
        type: string
    required:
    - reason
    - reference
    type: object
  dto.FeeChargeReversalResponse:
    properties:
      event_uuid:
        type: string
      new_balance:
        type: string
      reversal_tran_key:
        type: integer
      was_already_reversed:
        type: boolean
    type: object
  dto.FieldError:
    properties:
      code:
        type: string
      message:
        type: string
      path:
        type: string
    type: object
  dto.KycResponse:
    properties:
      client_no:
        type: string
      kyc_tier:
        type: string
      risk_level:
        type: string
      status:
        type: string
      verified_at:
        type: string
    type: object
  dto.KycUpdateRequest:
    properties:
      ekyc_provider:
        maxLength: 40
        type: string
      ekyc_ref:
        maxLength: 80
        type: string
      extra_data:
        additionalProperties: {}
        type: object
      face_match_score:
        maximum: 1
        minimum: 0
        type: number
      kyc_tier:
        enum:
        - "0"
        - "1"
        - "2"
        - "3"
        type: string
      liveness_result:
        maxLength: 8
        type: string
      risk_level:
        maxLength: 4
        type: string
      status:
        enum:
        - A
        - B
        - C
        - P
        type: string
    type: object
  dto.LinkBankRequest:
    properties:
      acct_holder_name:
        maxLength: 200
        type: string
      acct_no:
        maxLength: 40
        type: string
      bank_code:
        maxLength: 20
        type: string
      bank_name:
        maxLength: 120
        type: string
      is_default:
        type: boolean
    required:
    - acct_no
    - bank_code
    type: object
  dto.MarkResponse:
    properties:
      acct_no:
        type: string
      event_uuid:
        type: string
      status:
        type: string
      transaction_status:
        description: ISO 20022 (§13.3)
        type: string
    type: object
  dto.MerchantDepositRequest:
    properties:
      amount:
        type: string
      group_id:
        maxLength: 20
        minLength: 2
        type: string
      metadata:
        additionalProperties: {}
        type: object
      reference:
        maxLength: 64
        minLength: 8
        type: string
    required:
    - amount
    - group_id
    - reference
    type: object
  dto.MerchantDepositResponse:
    properties:
      event_uuid:
        type: string
      new_balance:
        type: string
      shard_index:
        description: null when routed to settlement (cold group)
        type: integer
      status:
        type: string
      target_acct_no:
        type: string
      tran_internal_key:
        type: integer
    type: object
  dto.MerchantWithdrawRequest:
    properties:
      amount:
        type: string
      auto_sweep:
        description: AutoSweep defaults to true (pointer distinguishes "omitted" from
          "false").
        type: boolean
      ext_payout_ref:
        maxLength: 64
        minLength: 8
        type: string
      group_id:
        maxLength: 32
        minLength: 2
        type: string
      reference:
        maxLength: 64
        minLength: 8
        type: string
    required:
    - amount
    - group_id
    - reference
    type: object
  dto.MerchantWithdrawResponse:
    properties:
      amount:
        type: string
      event_uuid:
        type: string
      fee_gross:
        type: string
      settlement_balance_after:
        type: string
      status:
        type: string
      total_deducted:
        type: string
      tran_internal_key:
        type: integer
      transaction_status:
        description: ISO 20022 (§13.3)
        type: string
      vat_amount:
        type: string
    type: object
  dto.MerchantWithdrawReversalRequest:
    properties:
      fail_code:
        maxLength: 64
        minLength: 3
        type: string
      fail_reason:
        maxLength: 500
        minLength: 3
        type: string
      initiator:
        enum:
        - OPS_MANUAL
        - FRAUD
        - DISPUTE
        - SYSTEM
        type: string
      reference:
        maxLength: 64
        minLength: 8
        type: string
    required:
    - fail_code
    - fail_reason
    - reference
    type: object
  dto.MerchantWithdrawReversalResponse:
    properties:
      event_uuid:
        type: string
      reversal_tran_key:
        type: integer
      settlement_balance_after:
        type: string
      was_already_reversed:
        type: boolean
    type: object
  dto.OnboardRequest:
    properties:
      acct_type:
        enum:
        - CONSUMER
        - MERCHANT
        type: string
      birthdate:
        description: Flat identity columns (FM_CLIENT_KYC). Dates are YYYY-MM-DD.
        type: string
      ccy:
        type: string
      client_name:
        maxLength: 200
        type: string
      client_type:
        enum:
        - IND
        - CORP
        - MER
        type: string
      country_citizen:
        maxLength: 8
        type: string
      country_loc:
        maxLength: 8
        type: string
      date_issue:
        type: string
      email:
        maxLength: 120
        type: string
      expire_date:
        type: string
      extra_data:
        additionalProperties: {}
        type: object
      global_id:
        maxLength: 64
        type: string
      global_id_type:
        maxLength: 12
        type: string
      phone:
        type: string
      place_issue:
        maxLength: 120
        type: string
      sex:
        enum:
        - M
        - F
        - O
        type: string
    required:
    - client_name
    - client_type
    - phone
    type: object
  dto.OnboardResponse:
    properties:
      acct_no:
        type: string
      balance:
        type: string
      ccy:
        type: string
      client_no:
        type: string
      created_at:
        type: string
      internal_key:
        type: integer
      kyc_status:
        type: string
      kyc_tier:
        type: string
    type: object
  dto.OpenAccountRequest:
    properties:
      acct_type:
        type: string
      ccy:
        maxLength: 4
        type: string
      client_no:
        maxLength: 48
        type: string
    required:
    - acct_type
    - client_no
    type: object
  dto.ProblemDetails:
    properties:
      detail:
        description: human-readable detail (dynamic context)
        example: available 50000 < required 100000
        type: string
      details:
        additionalProperties: {}
        type: object
      errorCode:
        description: 'SQLSTATE-style code: real pg SQLSTATE (P0060/40001/23505) for
          PG-raised, E#### synthetic for Go-side, "999999" when the canonical name
          is not whitelisted (§3.3)'
        example: E4022
        type: string
      errorMessage:
        description: 'full raw "CODE: detail" message (pg.Message verbatim for PG
          errors, synthesized for Go); "Internal Error" when not whitelisted'
        example: 'INSUFFICIENT_FUNDS: available 50000 < required 100000'
        type: string
      errors:
        description: field-level (Berlin Group / OBIE style)
        items:
          $ref: '#/definitions/dto.FieldError'
        type: array
      iso20022_reason_code:
        description: ISO 20022 External Status Reason (§13.2)
        example: AM04
        type: string
      timestamp:
        description: RFC 3339
        example: "2026-06-06T07:30:00Z"
        type: string
      trace_id:
        description: = X-Request-Id
        example: 5f3b2c8e-1a2b-4c3d-9e8f-0a1b2c3d4e5f
        type: string
      transaction_status:
        description: pain.002 status (§13.3)
        example: RJCT
        type: string
    type: object
  dto.ProvisionGroupRequest:
    properties:
      acct_type:
        maxLength: 12
        type: string
      ccy:
        type: string
      client_no:
        maxLength: 48
        minLength: 2
        type: string
      group_id:
        maxLength: 20
        minLength: 2
        type: string
      group_type:
        enum:
        - MERCHANT
        - AGENT
        - NOSTRO_HOT
        type: string
      shard_buffer:
        type: string
      shard_threshold:
        type: string
      sweep_interval_sec:
        maximum: 3600
        minimum: 1
        type: integer
    required:
    - client_no
    - group_id
    type: object
  dto.ProvisionGroupResponse:
    properties:
      group_id:
        type: string
      group_status:
        type: string
      group_type:
        type: string
      settlement_acct_no:
        type: string
      settlement_internal_key:
        type: integer
    type: object
  dto.ReleaseRestraintRequest:
    properties:
      reason:
        maxLength: 500
        type: string
    type: object
  dto.RescaleHotWalletRequest:
    properties:
      new_shard_count:
        enum:
        - 8
        - 16
        type: integer
    required:
    - new_shard_count
    type: object
  dto.RescaleHotWalletResponse:
    properties:
      added_acct_nos:
        items:
          type: string
        type: array
      group_id:
        type: string
      new_shard_count:
        type: integer
      old_shard_count:
        type: integer
      rebalanced_amount:
        type: string
      settlement_acct_no:
        type: string
    type: object
  dto.RestraintListResponse:
    properties:
      acct_no:
        type: string
      count:
        type: integer
      items:
        items:
          $ref: '#/definitions/dto.RestraintViewResponse'
        type: array
      next_cursor:
        description: pass as ?before_seq= for the next page
        type: integer
      page_size:
        type: integer
    type: object
  dto.RestraintResponse:
    properties:
      available_bal_after:
        type: string
      pledged_amt:
        type: string
      restraint_id:
        type: integer
      status:
        description: '''A'' added | ''R'' released'
        type: string
      version:
        type: integer
    type: object
  dto.RestraintViewResponse:
    properties:
      acct_no:
        description: empty for group-scoped
        type: string
      created_at:
        type: string
      created_by:
        type: string
      end_date:
        type: string
      narrative:
        type: string
      pledged_amt:
        type: string
      reference_doc:
        type: string
      removed_at:
        type: string
      removed_by:
        type: string
      removed_reason:
        type: string
      restraint_id:
        type: integer
      restraint_purpose:
        type: string
      restraint_type:
        type: string
      start_date:
        type: string
      status:
        description: A active | R released | E expired
        type: string
    type: object
  dto.ReversalRequest:
    properties:
      fail_code:
        enum:
        - NAPAS_INSUFFICIENT_FUNDS
        - BENEF_CLOSED
        - NAPAS_TIMEOUT
        - SLA_TIMEOUT
        - OPS_MANUAL
        - UNKNOWN
        type: string
      fail_reason:
        maxLength: 500
        minLength: 4
        type: string
      initiator:
        enum:
        - TREASURY_FAILED
        - SLA_TIMEOUT
        - OPS_MANUAL
        type: string
    required:
    - fail_code
    - fail_reason
    - initiator
    type: object
  dto.ReversalResponse:
    properties:
      event_uuid:
        type: string
      reversal_tran_key:
        type: integer
      was_already_reversed:
        type: boolean
    type: object
  dto.SuccessEnvelope:
    properties:
      data: {}
      errorCode:
        type: string
      errorMessage:
        type: string
      timestamp:
        type: string
      trace_id:
        type: string
    type: object
  dto.TopupRequest:
    properties:
      acct_no:
        type: string
      amount:
        type: string
      metadata:
        additionalProperties: {}
        type: object
      narrative:
        maxLength: 250
        type: string
      reference:
        maxLength: 64
        minLength: 8
        type: string
    required:
    - acct_no
    - amount
    - reference
    type: object
  dto.TopupResponse:
    properties:
      event_uuid:
        type: string
      new_balance:
        type: string
      status:
        type: string
      tran_internal_key:
        type: integer
      transaction_status:
        description: ISO 20022 (§13.3)
        type: string
    type: object
  dto.TopupReversalRequest:
    properties:
      initiator:
        enum:
        - OPS_MANUAL
        - FRAUD
        - DISPUTE
        - SYSTEM
        type: string
      reason:
        maxLength: 500
        minLength: 3
        type: string
      reference:
        maxLength: 64
        minLength: 8
        type: string
    required:
    - reason
    - reference
    type: object
  dto.TopupReversalResponse:
    properties:
      event_uuid:
        type: string
      new_balance:
        type: string
      reversal_tran_key:
        type: integer
      was_already_reversed:
        type: boolean
    type: object
  dto.TransferRequest:
    properties:
      amount:
        type: string
      from_acct_no:
        type: string
      metadata:
        additionalProperties: {}
        type: object
      narrative:
        maxLength: 250
        type: string
      reference:
        maxLength: 64
        minLength: 8
        type: string
      to_acct_no:
        type: string
      tran_type:
        enum:
        - TRFOUT
        - TRFOUTF
        type: string
    required:
    - amount
    - from_acct_no
    - reference
    - to_acct_no
    type: object
  dto.TransferResponse:
    properties:
      event_uuid:
        type: string
      fee_gross:
        type: string
      new_balance_from:
        type: string
      new_balance_to:
        type: string
      status:
        type: string
      tran_internal_key:
        type: integer
      transaction_status:
        description: ISO 20022 (§13.3)
        type: string
      vat_amount:
        type: string
    type: object
  dto.TransferReversalRequest:
    properties:
      initiator:
        enum:
        - OPS_MANUAL
        - FRAUD
        - DISPUTE
        - SYSTEM
        type: string
      reason:
        maxLength: 500
        minLength: 3
        type: string
      reference:
        maxLength: 64
        minLength: 8
        type: string
    required:
    - reason
    - reference
    type: object
  dto.TransferReversalResponse:
    properties:
      event_uuid:
        type: string
      new_balance_from:
        type: string
      new_balance_to:
        type: string
      reversal_tran_key:
        type: integer
      was_already_reversed:
        type: boolean
    type: object
  dto.TxDetailResponse:
    properties:
      leg_count:
        type: integer
      legs:
        items:
          $ref: '#/definitions/dto.TxLegResponse'
        type: array
      post_date:
        type: string
      reference:
        type: string
      transaction_id:
        description: tran_internal_key
        type: integer
    type: object
  dto.TxEntryResponse:
    properties:
      amount:
        type: string
      balance_after:
        type: string
      ccy:
        type: string
      dr_cr:
        type: string
      narrative:
        type: string
