        description: ISO 20022 (§13.3)
        type: string
      vat_amount:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: hoalh2@hdbank.com.vn
    name: Core Wallet Team
  description: |-
    Double-entry e-wallet ledger. The Go service is a thin RPC client over PostgreSQL stored functions; all balance validation, double-entry posting, fee/VAT and reversal logic run atomically in plpgsql. Scope is internal synchronous posting (top-up, transfer, withdraw, merchant settlement, fee/VAT, reversal). External rails (NAPAS, card 3DS, MT940) are out of scope.

    ## Response envelope
    All responses use a uniform envelope. Success (2xx): `{ "errorCode": "00000", "errorMessage": "Success!", "data": <payload>, "trace_id": "...", "timestamp": "..." }` — the operation payload shown in each endpoint's 200/201 schema lives under `data`. Errors use `application/problem+json`: `errorCode` is a SQLSTATE-style code (real PostgreSQL SQLSTATE for SP-raised errors, an `E####` synthetic for Go-side errors, or `999999` when the code is not client-safe), and `errorMessage` is the full `BUSINESS_CODE: detail` string whose leading token is the business code listed below. Errors also carry `iso20022_reason_code`, `transaction_status` (pain.002), `detail`, `trace_id`, `timestamp`, and field-level `errors`.

    ### Business error code catalogue
    `business code` = leading token of `errorMessage`; `errorCode` = the value returned in the body's `errorCode` field.
    | business code | errorCode | HTTP | ISO 20022 | Description |
    | --- | --- | --- | --- | --- |
    | INVALID_AMOUNT | E4024 | 400 | AM12 | The transaction amount is invalid or missing |
    | AMOUNT_OUT_OF_RANGE | E4024 | 400 | AM02 | The amount is outside the allowed range for this transaction type |
    | METADATA_TOO_LARGE | E4007 | 400 | - | The metadata payload exceeds the maximum allowed size (1 KB) |
    | METADATA_HAS_P1 | E4008 | 400 | - | The metadata contains forbidden PII keys (phone, email, cccd, passport, full_name, bank_acct_no) |
    | SAME_ACCOUNT | E4002 | 400 | BE01 | Source and destination accounts must be different |
    | TRAN_TYPE_INACTIVE | E4003 | 400 | AG02 | The requested transaction type is inactive or does not exist |
    | INVALID_REQUEST | E4001 | 400 | - | The request body is malformed or missing required fields |
    | INVALID_PHONE_FORMAT | E2001 | 400 | - | Phone number must match Vietnam format 0XXXXXXXXX (10 digits) |
    | INSUFFICIENT_FUNDS | E4022 | 422 | AM04 | The account balance is not sufficient to cover this transaction |
    | TIER_LIMIT_EXCEEDED | E4023 | 422 | AM02 | The transaction exceeds the daily or monthly limit for this account tier |
    | ACCT_ROLE_INVALID | E3008 | 422 | - | Operation only allowed on standalone wallets, not SHARD/SETTLEMENT accounts |
    | INVALID_CLIENT_TYPE | E2010 | 422 | - | Client type must be one of IND, CORP, MER |
    | INVALID_ACCT_TYPE | E3007 | 422 | - | The specified account type does not exist |
    | ACCT_CLOSE_NONZERO_BAL | E3003 | 422 | - | Account closure requires a zero balance |
    | ORG_FIELDS_REQUIRED | E2013 | 422 | - | Corporate/merchant clients must provide business_reg_no and legal_rep in extra_data |
    | INVALID_SHARD_COUNT | E3030 | 422 | - | Shard count must be 4, 8, or 16 |
    | INVALID_GROUP_TYPE | E3032 | 422 | - | Group type must be one of MERCHANT, AGENT, NOSTRO_HOT |
    | INVALID_DATE | E8003 | 422 | DT01 | The as_of_date parameter is invalid or refers to a future date |
    | BATCH_SIZE_EXCEEDED | E8004 | 422 | - | The batch request exceeds the maximum number of items (100) |
    | RESTRAINT_TYPE_INVALID | E3022 | 422 | - | Restraint type must be one of DEBIT, CREDIT, ALL, INFO |
    | RESTRAINT_PURPOSE_INVALID | E3023 | 422 | - | Restraint purpose is not a recognized value |
    | RESTRAINT_TYPE_PURPOSE_CONFLICT | E3024 | 422 | - | The restraint type/purpose combination is not allowed |
    | RESTRAINT_AMT_EXCEEDS_BALANCE | E3025 | 422 | AM04 | The pledged amount cannot exceed the current account balance |
    | RESTRAINT_DATE_INVALID | E3026 | 422 | DT01 | The end_date must be on or after the start_date |
    | COURT_ORDER_REMOVE_REQUIRES_DOC | E3027 | 422 | RR04 | Removing a COURT_ORDER/TAX_LIEN restraint requires a reference_doc |
    | TIER_INSUFFICIENT | E2007 | 403 | RR04 | Your KYC tier does not permit this operation |
    | FORBIDDEN | E1006 | 403 | AG01 | You do not have permission to perform this operation |
    | UNAUTHORIZED | E1001 | 401 | - | Authentication is required or the provided credentials are invalid |
    | DR_RESTRAINT_ACTIVE | E3005 | 423 | AC06 | The account has an active debit restraint (hold/lien) |
    | CR_RESTRAINT_ACTIVE | E3006 | 423 | AC06 | The account has an active credit restraint |
    | ACCT_NOT_FOUND | E3001 | 404 | AC01 | The specified account does not exist |
    | CLIENT_NOT_FOUND | E2011 | 404 | - | No client record found for the specified client number |
    | KYC_NOT_FOUND | E2012 | 404 | - | No KYC record exists for this client |
    | BANK_LINK_NOT_FOUND | E2014 | 404 | - | No linked bank account found with the specified ID |
    | RESTRAINT_NOT_FOUND | E3020 | 404 | - | No restraint exists with the specified ID |
    | WD_NOT_FOUND | E6101 | 404 | - | No withdrawal record found for the given payout reference |
    | ACCT_NOT_ACTIVE | E3004 | 403 | AC04 | The account is blocked or closed and cannot process transactions |
    | VERSION_CONFLICT | E4025 | 409 | - | Another transaction updated this account simultaneously; retryable |
    | DUPLICATE_REFERENCE | E4011 | 409 | AM05 | A transaction with this reference has already been processed |
    | CLIENT_ALREADY_EXISTS | E2009 | 409 | AM05 | A client with this identity document already exists |
    | PHONE_ALREADY_REGISTERED | E2002 | 409 | AM05 | This phone number is already associated with an existing account |
    | MAX_WALLET_PER_CLIENT_EXCEEDED | E3002 | 409 | - | Maximum number of wallets reached (CONSUMER 3 per currency, MERCHANT 10) |
    | GROUP_ALREADY_ACTIVATED | E3031 | 409 | - | This merchant group has already been activated with shards |
    | GROUP_ALREADY_EXISTS | E3033 | 409 | AM05 | A group with this ID already exists |
    | GROUP_NOT_ACTIVATED | E3034 | 409 | - | This group is still cold (0 shards); activate it before rescaling |
    | RESTRAINT_ALREADY_REMOVED | E3021 | 409 | - | This restraint has already been released or expired |
    | WD_ALREADY_COMPLETED | E6102 | 409 | - | This withdrawal has already reached COMPLETED status |
    | WD_INVALID_STATE | E6103 | 409 | - | The withdrawal is in a state that does not permit this transition |
    | WD_ALREADY_REVERSED | E6104 | 409 | - | This withdrawal has already been reversed |
    | PERIOD_CLOSED | E8005 | 409 | DT01 | The target accounting date is sealed; post against the current open period |
    | GONE_ONLINE | E8001 | 410 | - | Historical data beyond the online retention period; request an archive extract |
    | TIMEOUT | E9004 | 504 | - | The request exceeded the allowed processing time; you may retry (503 on lock timeout) |
    | PII_DEK_NOT_SET | E5005 | 500 | - | The server PII data-encryption key (DEK) is not set |
    | BATCH_UNBALANCED | E5003 | 500 | - | Internal double-entry invariant violated (sum of debits != sum of credits) |
    | INTERNAL_ERROR | E9001 | 500 | - | An unexpected error occurred; please retry or contact support |

    Family fallbacks: any `*_NOT_FOUND` -> 404, `*_NOT_ACTIVE` -> 403, `*_CONFLICT` -> 409 (e.g. GROUP_NOT_FOUND, SETTLEMENT_NOT_FOUND, GROUP_NOT_ACTIVE).
  license:
    name: Proprietary
  termsOfService: https://docs.wallet.example/terms
  title: Core Wallet API
  version: "1.0"
paths:
  /healthz:
    get:
      description: Cheap liveness probe (no DB round-trip).
      produces:
      - application/json
      responses:
        "200":
          description: 'status: ok'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
  /v1/accounts:
    post:
      consumes:
      - application/json
      description: Open a zero-balance wallet for a client (count-limited per currency).
      parameters:
      - description: Open account request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.OpenAccountRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/dto.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/dto.AccountOpenResponse'
              type: object
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "404":
          description: Client not found
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "422":
          description: Business rule violation (e.g. account count limit)
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
      summary: Open a wallet
      tags:
      - accounts
  /v1/accounts/{acct_no}:
    get:
      description: Account profile (no client PII).
      parameters:
      - description: Account number
        in: path
        name: acct_no
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/dto.AccountResponse'
              type: object
        "404":
          description: Account not found
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
      summary: Get account profile
      tags:
      - accounts
    patch:
      consumes:
      - application/json
      description: Block / close / re-activate an account (status A | B | C).
      parameters:
      - description: Account number
        in: path
        name: acct_no
        required: true
        type: string
      - description: Status update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateAccountStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/dto.AccountStatusResponse'
              type: object
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "404":
          description: Account not found
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "422":
          description: Business rule violation (e.g. illegal transition)
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
      summary: Update account status
      tags:
      - accounts
  /v1/accounts/{acct_no}/balance:
    get:
      description: Without as_of_date → customer realtime balance (§9.3.1). With as_of_date
        → historical end-of-day snapshot (§9.3.3, returns BalanceAsOfResponse).
      parameters:
      - description: Account number
        in: path
        name: acct_no
        required: true
        type: string
      - description: Historical EOD snapshot date (YYYY-MM-DD)
        in: query
        name: as_of_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Realtime balance (or BalanceAsOfResponse when as_of_date is
            set)
          schema:
            allOf:
            - $ref: '#/definitions/dto.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/dto.BalanceResponse'
              type: object
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "404":
          description: Account not found
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
      summary: Get account balance
      tags:
      - accounts
  /v1/clients:
    get:
      description: Masked client list (PII masked), keyset-paginated by client_no
        ascending. Optional status / client_type filters. Pass next_cursor as ?after=
        for the next page.
      parameters:
      - description: Filter by status (A|B|C)
        in: query
        name: status
        type: string
      - description: Filter by client_type (IND|CORP|MER)
        in: query
        name: client_type
        type: string
      - description: Page size (1..200, default 100)
        in: query
        name: limit
        type: integer
      - description: 'Keyset cursor: return rows with client_no > after'
        in: query
        name: after
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/dto.ClientListResponse'
              type: object
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
      summary: List clients (masked)
      tags:
      - clients
    post:
      consumes:
      - application/json
      description: Create a client master record (identity only; no KYC flow). client_type
        is IND | CORP | MER.
      parameters:
      - description: Client create request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateClientRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/dto.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/dto.ClientResponse'
              type: object
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "422":
          description: Business rule violation (e.g. invalid client type)
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
      summary: Create a client
      tags:
      - clients
  /v1/clients/{client_no}:
    get:
      description: Masked client profile (name + CCCD/passport masked); raw PII never
        exposed on this path.
      parameters:
      - description: Client number
        in: path
        name: client_no
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/dto.ClientProfileResponse'
              type: object
        "404":
          description: Client not found
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
      summary: Get a client (masked)
      tags:
      - clients
    patch:
      consumes:
      - application/json
      description: Patch mutable identity fields of an existing client (all fields
        optional).
      parameters:
      - description: Client number
        in: path
        name: client_no
        required: true
        type: string
      - description: Client update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateClientRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/dto.ClientResponse'
              type: object
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "404":
          description: Client not found
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "422":
          description: Business rule violation
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
      summary: Update a client
      tags:
      - clients
  /v1/clients/{client_no}/banks:
    post:
      consumes:
      - application/json
      description: Link a bank account (optionally as default). acct_no is plaintext
        in; the SP encrypts it at rest and never echoes it in clear.
      parameters:
      - description: Client number
        in: path
        name: client_no
        required: true
        type: string
      - description: Bank link request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LinkBankRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/dto.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/dto.BankLinkResponse'
              type: object
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "404":
          description: Client not found
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "422":
          description: Business rule violation
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
      summary: Link a bank account to a client
      tags:
      - clients
  /v1/clients/{client_no}/banks/{link_id}/default:
    put:
      description: Make an existing linked bank the client's default.
      parameters:
      - description: Client number
        in: path
        name: client_no
        required: true
        type: string
      - description: Bank link id
        in: path
        name: link_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/dto.BankLinkResponse'
              type: object
        "400":
          description: Invalid link id
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "404":
          description: Client or link not found
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
      summary: Set default linked bank
      tags:
      - clients
  /v1/clients/{client_no}/kyc:
    post:
      consumes:
      - application/json
      description: Submit/update eKYC info and raise the KYC tier (US-1.2). Reaching
        tier >= 2 stamps verified_at.
      parameters:
      - description: Client number
        in: path
        name: client_no
        required: true
        type: string
      - description: KYC update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.KycUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/dto.KycResponse'
              type: object
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "404":
          description: Client not found
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "422":
          description: Business rule violation
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
      summary: Update client KYC
      tags:
      - clients
  /v1/finance/fee-charge:
    post:
      consumes:
      - application/json
      description: Charge an annual/penalty/service fee (with VAT) against a wallet,
        not tied to any money movement (US-2.8). Idempotent on `reference`.
      parameters:
      - description: Fee charge request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.FeeChargeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Duplicate idempotent replay
          schema:
            allOf:
            - $ref: '#/definitions/dto.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/dto.FeeChargeResponse'
              type: object
        "201":
          description: Posted
          schema:
            allOf:
            - $ref: '#/definitions/dto.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/dto.FeeChargeResponse'
              type: object
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "422":
          description: Business rule violation (e.g. insufficient funds)
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/dto.ProblemDetails'
      summary: Charge a standalone fee + VAT
      tags:
      - finance
  /v1/finance/fee-charge/reverse:
    post:
      consumes:
      - application/json
      description: Reverse a fee charge by its original `reference` (US-2.8). Idempotent.
      parameters:
      - description: Fee reversal request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.FeeChargeReversalRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.SuccessEnvelope'
