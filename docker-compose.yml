# =============================================================================
# Core Wallet — Local Dev Stack (PostgreSQL 17 + PgBouncer transaction mode)
#
# Quickstart:
#   cp .env.example .env          # adjust passwords if needed
#   docker compose up -d
#   docker compose logs -f postgres
#   # Wait for "database system is ready to accept connections" + schema init done
#   docker compose exec postgres psql -U postgres -d wallet -c "\dt"
#
# Connect from app (via PgBouncer, transaction mode):
#   host=localhost port=6432 dbname=wallet user=wallet_app
#
# Direct PG (for admin / migrations / pgTAP):
#   host=localhost port=5432 dbname=wallet user=postgres
#
# Tear down:
#   docker compose down              # keep volumes
#   docker compose down -v           # nuke data
# =============================================================================

name: core-wallet

services:
  postgres:
    image: postgres:17-alpine
    container_name: wallet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wallet}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_dev_only}
      # Application role passwords (read by init-roles.sh)
      WALLET_APP_PASSWORD: ${WALLET_APP_PASSWORD:-wallet_app_dev}
      WALLET_PII_RO_PASSWORD: ${WALLET_PII_RO_PASSWORD:-wallet_pii_dev}
      WALLET_ADMIN_PASSWORD: ${WALLET_ADMIN_PASSWORD:-wallet_admin_dev}
      # PG runtime
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: Asia/Ho_Chi_Minh
      LANG: en_US.UTF-8
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deploy/docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./deploy/docker/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      # Init scripts run in lexicographic order of their CONTAINER target name.
      # The whole DB is two generated artifacts in db/export/ (regenerate with
      # pg_dump — see db/export/README.md):
      #   01-schema.sql      all DDL: tables (incl. the 4 partitioned PARENTS, no
      #                      child partitions), sequences, indexes, constraints,
      #                      functions, procedures, triggers (incl. the balanced-
      #                      posting CONSTRAINT TRIGGER), views, extensions, GRANTs.
      #   02-partitions.sql  monthly partitions for the 4 parents (wlt_tran_hist also
      #                      hash-subpartitioned) + DEFAULT partitions. Idempotent;
      #                      re-runnable to roll partitions forward.
      #   03-seed.sql        reference/master data: GL master (fm_gl_mast), COA map
      #                      (wlt_gl_map), tran types (wlt_tran_def), currency, acct types.
      # 00 creates the roles the schema grants to; 99 re-aligns passwords + verifies.
      - ./deploy/docker/postgres/init/00-set-passwords.sh:/docker-entrypoint-initdb.d/00-set-passwords.sh:ro
      - ./db/export/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/export/partitions.sql:/docker-entrypoint-initdb.d/02-partitions.sql:ro
      - ./db/export/seed.sql:/docker-entrypoint-initdb.d/03-seed.sql:ro
      - ./deploy/docker/postgres/init/03-update-role-passwords.sh:/docker-entrypoint-initdb.d/99-update-role-passwords.sh:ro
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "hba_file=/etc/postgresql/pg_hba.conf"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wallet"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "1"
          memory: 4G
    shm_size: 1g       # PG shared memory (avoid "could not resize shared memory")
    networks:
      - wallet-net

  pgbouncer:
    image: edoburu/pgbouncer:1.22.1-p0
    container_name: wallet-pgbouncer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy  
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-wallet}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres_dev_only}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 16
      MAX_CLIENT_CONN: 500
      RESERVE_POOL_SIZE: 10
      RESERVE_POOL_TIMEOUT: 5
      SERVER_IDLE_TIMEOUT: 600
      MAX_PREPARED_STATEMENTS: 200
      AUTH_TYPE: scram-sha-256
      ADMIN_USERS: postgres
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,application_name,search_path
      # Enable verbose stats endpoint for monitoring
      STATS_PERIOD: 60
    ports:
      - "${PGBOUNCER_PORT:-6432}:5432"
    volumes:
      - ./deploy/docker/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./deploy/docker/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    healthcheck:
      test: ["CMD-SHELL", "psql -h 127.0.0.1 -p 5432 -U postgres -d pgbouncer -c 'SHOW POOLS' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
    networks:
      - wallet-net

  # Wallet Go service (thin RPC client → PgBouncer → PG stored functions).
  # Built from services/wallet-service/Dockerfile (distroless static binary).
  wallet-service:
    build:
      # Context is ./services (parent of both the service and the shared module)
      # so the `replace => ../shared` directive resolves inside the build tree.
      context: ./services
      dockerfile: wallet-service/Dockerfile
      args:
        VERSION: ${WALLET_SERVICE_VERSION:-dev}
    image: core-wallet/wallet-service:dev
    container_name: wallet-service
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-dev}
      GIN_MODE: ${GIN_MODE:-release}
      HTTP_ADDR: ":8080"
      # Connect THROUGH PgBouncer (transaction mode) on its IN-NETWORK port 5432,
      # not the host-mapped 6432. Same wallet_app role / password as the .env DSN.
      DB_DSN: postgres://wallet_app:${WALLET_APP_PASSWORD:-wallet_app_dev}@pgbouncer:5432/wallet?sslmode=disable
      # Least-privilege PII pool (wallet_pii_ro) for the unmasked client reads
      # (GET /v1/ops/clients[...], /360). Unset → piiPool falls back to wallet_app,
      # which has no SELECT on FM_CLIENT/FM_CLIENT_KYC → those reads 500.
      DB_PII_DSN: postgres://wallet_pii_ro:${WALLET_PII_RO_PASSWORD:-wallet_pii_dev}@pgbouncer:5432/wallet?sslmode=disable
      DB_LOCK_TIMEOUT: ${DB_LOCK_TIMEOUT:-1500ms}
      DB_STATEMENT_TIMEOUT: ${DB_STATEMENT_TIMEOUT:-2500ms}
      HTTP_REQUEST_TIMEOUT: ${HTTP_REQUEST_TIMEOUT:-10s}
      DB_MAX_CONNS: ${DB_MAX_CONNS:-50}
      DB_MIN_CONNS: ${DB_MIN_CONNS:-5}
      # Tracing → Jaeger (see the `jaeger` service, profile `tracing`). Opt in with
      # OTEL_ENABLED=true and start the tracing profile; default off needs no backend.
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-jaeger:4317}
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_SERVICE_NAME: wallet-service
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-1.0}
    ports:
      # Host :8019 → container :8080. 8019 is the k6 BASE_URL default (k6_wallet.js).
      - "${WALLET_SERVICE_PORT:-8019}:8080"
    # The image's HEALTHCHECK runs `wallet-service -healthz`, a flag main() does NOT
    # implement — it would boot a 2nd server, fail to bind :8080 and report unhealthy.
    # Disable it (distroless has no shell/curl for an HTTP CMD-SHELL probe) until a
    # real self-check flag exists.
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - wallet-net

  # Optional: Adminer for browsing DB during development. Comment out for prod-like dev.
  adminer:
    image: adminer:4.8.1
    container_name: wallet-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    networks:
      - wallet-net
    profiles:
      - dev          # only starts with `docker compose --profile dev up`

  # ---------------------------------------------------------------------------
  # Outbox → Kafka relay (services/outbox-relay). Polls WLT_OUTBOX (status
  # PENDING/FAILED) and publishes each row to its `topic` with key=partition_key,
  # then stamps it SENT (kafka_partition/offset). Opt-in via the `relay` profile:
  #   docker compose --profile relay up -d
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: wallet-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - wallet-net
    profiles:
      - relay

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: wallet-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners: PLAINTEXT for in-network clients (relay → kafka:9092),
      # PLAINTEXT_HOST for host tools (localhost:29092).
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "${KAFKA_HOST_PORT:-29092}:29092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - wallet-net
    profiles:
      - relay

  outbox-relay:
    build:
      # Context is ./services so the shared module (../shared) is in the build tree.
      context: ./services
      dockerfile: outbox-relay/Dockerfile
    image: core-wallet/outbox-relay:dev
    container_name: wallet-outbox-relay
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      # Direct to PostgreSQL (NOT PgBouncer): one claim+publish+mark cycle is a
      # single tx holding FOR UPDATE SKIP LOCKED locks across the Kafka publish.
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: wallet_app
      DB_PASSWORD: ${WALLET_APP_PASSWORD:-wallet_app_dev}
      DB_NAME: ${POSTGRES_DB:-wallet}
      KAFKA_BROKERS: kafka:9092
      POLL_INTERVAL: ${RELAY_POLL_INTERVAL:-1s}
      BATCH_SIZE: ${RELAY_BATCH_SIZE:-100}
      MAX_RETRIES: ${RELAY_MAX_RETRIES:-5}
      WORKER_COUNT: ${RELAY_WORKER_COUNT:-4}
      METRICS_PORT: 9090
      LOG_LEVEL: ${RELAY_LOG_LEVEL:-info}
      # Tracing → Jaeger. Continues the trace the posting SP stamped into the
      # outbox row across the publish to Kafka. Opt in with OTEL_ENABLED=true +
      # the `tracing` profile; default off so no backend is required.
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-jaeger:4317}
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_SERVICE_NAME: outbox-relay
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-1.0}
      ENV: ${APP_ENV:-dev}
    ports:
      - "${RELAY_METRICS_PORT:-9090}:9090"
    networks:
      - wallet-net
    profiles:
      - relay

  # ---------------------------------------------------------------------------
  # Jaeger all-in-one — the local OpenTelemetry tracing backend. It has a built-in
  # OTLP receiver (gRPC :4317, HTTP :4318), so wallet-service and outbox-relay
  # export straight to it — no separate otel-collector needed for local dev
  # (front it with one in prod). Opt-in via the `tracing` profile, e.g.:
  #   OTEL_ENABLED=true docker compose --profile relay --profile tracing up -d
  # Then open the UI at http://localhost:16686 and search by service / trace-id to
  # see one waterfall: HTTP → DB SP → relay publish → Kafka.
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: wallet-jaeger
    restart: unless-stopped
    # all-in-one defaults to in-memory storage (traces lost on restart). Use the
    # embedded Badger key-value store backed by a named volume so traces persist
    # across `docker compose down/up`. Runs as root so the nonroot image user can
    # write the freshly-created volume dir.
    user: "0"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    volumes:
      - jaeger_data:/badger
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"   # web UI
      - "${OTLP_GRPC_PORT:-4317}:4317"     # OTLP gRPC receiver
      - "${OTLP_HTTP_PORT:-4318}:4318"     # OTLP HTTP receiver
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M
    networks:
      - wallet-net
    profiles:
      - tracing

volumes:
  pg_data:
    name: wallet_pg_data
    driver: local
  jaeger_data:
    name: wallet_jaeger_data
    driver: local

networks:
  wallet-net:
    name: wallet-net
    driver: bridge
